name: Pull and compose after push on main on worker nodes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pull code
        uses: actions/checkout@v4

      - name: Copy worker files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose_files/worker_nodes/*"
          target: "/home/ubuntu/app" 
          strip_components: 2

      - name: SSH login and composing up
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
           
            sudo mkdir -p /srv/www
            sudo cp -r /home/ubuntu/app/* /srv/www/
            sudo chown -r ubuntu:ubuntu /srv/www
            
            cd /srv/www
            docker compose up -d
